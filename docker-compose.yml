services:
  postgres:
    image: postgres:16-alpine
    container_name: slope-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: slope
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: slope-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  cpp-runtime:
    build:
      context: ./apps/cpp-runtime
    container_name: slope-cpp-runtime
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  python-runtime:
    build:
      context: ./apps/python-runtime
    container_name: slope-python-runtime
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

  javascript-runtime:
    build:
      context: ./apps/javascript-runtime
    container_name: slope-javascript-runtime
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq

volumes:
  postgres_data:
